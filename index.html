<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Museo VR</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

    <script src="./components/aframe-lounge.js"></script>
    <script src="./components/star-sky.js"></script>
  </head>

  <body>
    <a-scene antialias="true">


      <a-entity light="type: ambient;
                       color: #ffffff;
                       intensity: 0.85">
      </a-entity>

      <a-entity light="type: ambient;
                       color: #ebd9e9;
                       intensity: 0.3">
      </a-entity>

      <a-entity id="lounge"
        lounge="
          width: 200;
          depth: 300;
          height: 100;
          ceiling: true;
          north: barrier;
          east: glass;
          south: wall;
          west: wall;
          floorTexture: ./assets/floor-texture.jpg;
          wallTexture: ./assets/jeroglifico.jpg;
          ceilingTexture: ./assets/jeroglifico.jpg;
        ">
      </a-entity>

      <a-entity lounge-entry-point>
        <a-entity
          id="camera1"
          camera
          position="-10 -45.0 20"
          look-controls
          wasd-controls>
        </a-entity>
      </a-entity>


      <a-entity id="esfera_1"
                geometry="primitive: sphere"
                material="color: #ff0000"
                position="0 -48.0 0"
                rotation="0 0 0"
                scale="3 3 3">
      </a-entity>

      <a-entity id="silla_1"
                gltf-model="./assets/models/furniture/chair_basic.glb"
                position="30 -42.0 30"
                rotation="0 0 0"
                scale="1 1 1">
      </a-entity>

      <a-entity id="cubo_1"
                geometry="primitive: box"
                material="color: #00ff00"
                position="50 -48.0 50"
                rotation="0 0 0"
                scale="3 3 3">
      </a-entity>

      <a-sky color="#0000ff"></a-sky>
      <a-entity star-sky></a-entity>

    </a-scene>
  </body>
</html>
