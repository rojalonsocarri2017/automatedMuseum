<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Voice → YAML → A-Frame</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    /* Overlay de controles */
    #ui-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      padding: 15px;
      border-radius: 8px;
      max-width: 400px;
    }

    button {
      padding: 10px 15px;
      margin-right: 10px;
      font-size: 16px;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
      color: darkblue;
    }

    pre {
      background: #eee;
      padding: 10px;
      border-radius: 5px;
      max-height: 200px;
      overflow: auto;
      margin-top: 10px;
    }

    a-scene {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="app.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="../../components/aframe-lounge.js"></script>
  <script src="../../components/star-sky.js"></script>
</head>

<body>

  <div id="ui-overlay">
    <h2>Control de habitación</h2>
    <button id="start">Hablar</button>
    <button id="stop">Parar</button>
    <div id="status">Estado: Inactivo</div>

    <h3>YAML generado</h3>
    <pre id="yamlOutput"></pre>
  </div>

  <a-scene embedded vr-mode-ui="enabled: true" id="vr-scene">
    <a-entity id="scene-root"></a-entity>
  </a-scene>

</body>
</html>
