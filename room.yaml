room:
  width: 50
  depth: 50
  height: 50
  ceiling: true
  walls:
    north: barrier
    east: glass
    south: wall
    west: wall
  textures:
    floor: ./assets/floor-texture.jpg
    wall: ./assets/jeroglifico.jpg
    ceiling: ./assets/jeroglifico.jpg
  entryPoint:
    x: -10
    'y': 2
    z: 20
  environment:
    skyColor: '#000000'
    stars: true
  lights:
    - type: ambient
      color: '#ffffff'
      intensity: 0.85
    - type: ambient
      color: '#ebd9e9'
      intensity: 0.3
  objects:
    - name: sphere_1
      primitive: sphere
      color: '#ff0000'
      position:
        x: -10
        'y': 2
        z: -10
      rotation:
        x: 0
        'y': 0
        z: 0
      scale:
        x: 3
        'y': 3
        z: 3
    - name: cube_1
      primitive: box
      color: '#ffc0cb'
      position:
        x: 10
        'y': 2
        z: 10
      rotation:
        x: 0
        'y': 0
        z: 0
      scale:
        x: 3
        'y': 3
        z: 3
    - name: chair_1
      model: chair_basic
      position:
        x: 0
        'y': 0
        z: 0
      rotation:
        x: 0
        'y': 0
        z: 0
      scale:
        x: 1
        'y': 1
        z: 1
